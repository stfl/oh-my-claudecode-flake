name: "Publish rolling release to FlakeHub"
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  flakehub-publish:
    runs-on: "ubuntu-latest"
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: "actions/checkout@v6"
        with:
          persist-credentials: false
      - uses: "DeterminateSystems/determinate-nix-action@v3"
      - uses: "DeterminateSystems/flakehub-push@main"
        with:
          visibility: "public"
          name: "stfl/oh-my-claudecode"
          rolling: true
          include-output-paths: true
