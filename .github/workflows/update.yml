name: Update oh-my-claudecode

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run update script
        run: nix run .#update

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet flake.nix flake.lock; then
            echo "Already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(grep 'version = "' flake.nix | head -1 | sed 's/.*version = "\(.*\)";.*/\1/')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock
          git commit -m "chore: update oh-my-claude-sisyphus to ${VERSION}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger FlakeHub publish workflow
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run flakehub-publish.yml --repo "$GITHUB_REPOSITORY"
